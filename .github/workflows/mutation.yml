name: Mutation Testing with dotnet-stryker

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      full_run:
        description: 'Run mutation testing on all files (slow without coverage optimisation)'
        required: false
        type: boolean
        default: false

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install dependencies
      working-directory: src
      run: dotnet restore

    - name: Build
      working-directory: src
      run: dotnet build --no-restore

    - name: Install dotnet-stryker
      working-directory: src
      run: dotnet tool install -g dotnet-stryker

    - name: Create diff target ref
      if: ${{ github.event_name == 'push' && inputs.full_run != true }}
      run: git branch stryker-diff-target ${{ github.event.before }}

    - name: Run dotnet-stryker
      working-directory: src
      env:
        STRYKER_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
      run: |
        if [ "${{ inputs.full_run }}" == "true" ] || [ "${{ github.event_name }}" != "push" ]; then
          dotnet stryker --dashboard-api-key "$STRYKER_KEY" --version "master"
        else
          dotnet stryker --since:stryker-diff-target --dashboard-api-key "$STRYKER_KEY" --version "master"
        fi
