name: Mutation Testing with dotnet-stryker

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install dependencies
      working-directory: src
      run: dotnet restore

    - name: Build
      working-directory: src
      run: dotnet build --no-restore

    - name: Install dotnet-stryker
      working-directory: src
      run: dotnet tool install -g dotnet-stryker

    - name: Run dotnet-stryker
      working-directory: src
      env:
        STRYKER_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
      run: dotnet stryker --dashboard-api-key "$STRYKER_KEY" --version "master"
